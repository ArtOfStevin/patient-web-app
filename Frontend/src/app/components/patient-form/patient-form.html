<div class="page-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        {{ isEditMode ? 'Edit Patient' : 'Create Patient' }}
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="patientForm" (ngSubmit)="savePatient()">

        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>PID</mat-label>
            <input matInput formControlName="pid" />
            <mat-error *ngIf="patientForm.get('pid')?.hasError('required')">
              PID is required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" />
            <mat-error *ngIf="patientForm.get('firstName')?.hasError('required')">
              First name is required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" />
            <mat-error *ngIf="patientForm.get('lastName')?.hasError('required')">
              Last name is required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Date of Birth</mat-label>
            <input matInput type="date" formControlName="dateOfBirth" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Gender</mat-label>
            <input matInput formControlName="gender" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Phone No</mat-label>
            <input matInput formControlName="phoneNo" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address</mat-label>
            <input matInput formControlName="address" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Suburb</mat-label>
            <input matInput formControlName="suburb" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>State</mat-label>
            <input matInput formControlName="state" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Postcode</mat-label>
            <input matInput formControlName="postcode" />
          </mat-form-field>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            {{ isEditMode ? 'Update' : 'Create' }}
          </button>

          <button mat-button type="button" (click)="cancel()">
            Cancel
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
